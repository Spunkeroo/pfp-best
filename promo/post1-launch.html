<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
body{width:1200px;height:675px;background:#0a0a0f;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.g1{position:absolute;width:600px;height:600px;background:#bf5af2;border-radius:50%;filter:blur(150px);opacity:.25;top:-200px;left:-100px}
.g2{position:absolute;width:500px;height:500px;background:#00f5d4;border-radius:50%;filter:blur(150px);opacity:.2;bottom:-200px;right:-100px}
.c{position:relative;z-index:2;text-align:center}
.big{font-size:110px;font-weight:900;letter-spacing:-4px;line-height:1;margin-bottom:24px}
.big span{background:linear-gradient(135deg,#bf5af2,#00f5d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mid{font-size:38px;font-weight:800;margin-bottom:40px;color:rgba(255,255,255,.85)}
.box{display:inline-block;background:linear-gradient(135deg,#bf5af2,#00f5d4);padding:18px 60px;border-radius:16px;font-size:30px;font-weight:800;color:#000;letter-spacing:1px}
.wm{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:800;color:rgba(255,255,255,.25)}
</style></head><body>
<div class="g1"></div><div class="g2"></div>
<div class="c">
<div class="big">Rate My <span>PFP</span></div>
<div class="mid">Upload. Get Rated. Get Roasted. 💀</div>
<div class="box">pfp.best — 100% Free</div>
</div>
<div class="wm">pfp.best</div>
</body></html>
